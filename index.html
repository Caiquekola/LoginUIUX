<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Ingressos - Discovery</title>
    <!-- Fonte Roboto -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Ícones Material Design -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎫</text></svg>">

    <!-- CSS Base do Material Design -->
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/layouts.css">
</head>
<body>
    <!-- Skip Link para acessibilidade (RNF03) -->
    <a href="#main-content" class="skip-link">Pular para o conteúdo principal</a>
    <header class="app-header" role="banner">
        <div class="header-content">
            <h1 onclick="window.location.href='/'" style="cursor: pointer;">🎫 TicketMaster IFMG</h1>
            <button class="icon-btn" aria-label="Perfil do Usuário">
                <span class="material-symbols-outlined">account_circle</span>
            </button>
        </div>
    </header>

    <section class="hero-section">
        <div class="hero-content">
            <h2>Bem-vindo aos melhores eventos!</h2>
            <p>Encontre o seu próximo evento incrível abaixo.</p>
        </div>
    </section>

    <main class="main-container" id="main-content" role="main">
        <!-- Search and Filter Section -->
        <section class="filter-section">
            <div class="search-bar">
                <label for="searchInput" class="visually-hidden">Buscar eventos</label>
                <span class="material-symbols-outlined search-icon">search</span>
                <input type="text" id="searchInput" placeholder="Buscar por nome do evento..." autocomplete="off">
            </div>

            <div class="chips-container" id="chipsContainer">
                <!-- Chips will be generated here -->
            </div>
            
            <div class="status-message" id="statusMessage" aria-live="polite">
                <!-- Mensagem de status de busca -->
            </div>
        </section>

        <!-- Events Grid -->
        <section class="events-grid" id="eventsGrid">
            <!-- Event cards will be dynamically rendered here -->
        </section>
    </main>

    <!-- Scripts -->
    <script src="/js/data.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/main.js"></script>
</body>
</html>
